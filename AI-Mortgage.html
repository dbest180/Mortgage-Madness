<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Studio Mortgage Calculator</title>
  <style>
    /* Design Variables */
    :root {
      --bg-color: #121212;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent-color: #00f2ff;
      --accent-glow: rgba(0, 242, 255, 0.3);
      --interest-color: #ff2a5f;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --transition-speed: 0.25s;
    }

    /* Base Reset & Styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* Backdrop Glowing Effects for Glassmorphism Context */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      pointer-events: none;
    }

    body::before {
      width: 350px;
      height: 350px;
      background: rgba(0, 242, 255, 0.12);
      top: 10%;
      left: 15%;
    }

    body::after {
      width: 450px;
      height: 450px;
      background: rgba(255, 42, 95, 0.08);
      bottom: 10%;
      right: 15%;
    }

    /* Container & Typography */
    .app-container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Calculator Grid */
    .calculator-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      width: 100%;
    }

    /* Glassmorphic Panel Layout */
    .panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Form & Input Groups */
    .input-group {
      margin-bottom: 24px;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .label-row label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Text Inputs with Prefix/Suffix */
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 0 12px;
      transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
      width: 150px;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .input-wrapper input[type="number"] {
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 1.05rem;
      font-weight: 600;
      width: 100%;
      height: 38px;
      outline: none;
      text-align: right;
    }

    /* Remove browser default arrows on number input */
    .input-wrapper input[type="number"]::-webkit-inner-spin-button,
    .input-wrapper input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .input-wrapper input[type="number"] {
      -moz-appearance: textfield;
    }

    .input-addon {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      margin-right: 4px;
    }

    .input-addon-suffix {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      margin-left: 4px;
    }

    /* Slider Inputs styling */
    .slider-container {
      margin-top: 12px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      transition: background var(--transition-speed);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 10px var(--accent-glow);
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 10px var(--accent-glow);
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.1s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
    }

    /* Results Layout styling */
    .results-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .results-header span {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .monthly-payment-amount {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--accent-color);
      text-shadow: 0 0 15px var(--accent-glow);
      margin-top: 4px;
    }

    /* Visualization Donut Chart */
    .chart-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 24px 0;
      position: relative;
    }

    .donut-chart {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      /* Dynamic conic-gradient fallback, updated via JS */
      background: conic-gradient(var(--accent-color) 0% 50%, var(--interest-color) 50% 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* Inner circle to make it a donut */
    .donut-chart::after {
      content: "";
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #171717; /* Dark background to match card depth */
      position: absolute;
      z-index: 1;
    }

    .chart-label {
      position: absolute;
      z-index: 2;
      text-align: center;
    }

    .chart-label .percent-val {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .chart-label .sub-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Breakdown Data Fields */
    .breakdown-list {
      border-top: 1px solid var(--card-border);
      padding-top: 20px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .breakdown-item:last-child {
      margin-bottom: 0;
      border-top: 1px dotted var(--card-border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .item-label {
      display: flex;
      align-items: center;
      color: var(--text-muted);
    }

    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .dot-principal {
      background-color: var(--accent-color);
      box-shadow: 0 0 6px var(--accent-glow);
    }

    .dot-interest {
      background-color: var(--interest-color);
      box-shadow: 0 0 6px rgba(255, 42, 95, 0.4);
    }

    .item-value {
      font-weight: 600;
      color: var(--text-main);
    }

    .total-paid-value {
      font-size: 1.1rem;
      color: var(--accent-color);
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .calculator-grid {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 24px;
      }

      .monthly-payment-amount {
        font-size: 2.3rem;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Mortgage Calculator</h1>
      <p>Sleek, real-time home loan payment estimator</p>
    </header>

    <div class="calculator-grid">
      <!-- Left Column: Inputs Panel -->
      <main class="panel">
        <!-- Input Group: Loan Amount -->
        <div class="input-group">
          <div class="label-row">
            <label for="loanAmountNum">Home Price</label>
            <div class="input-wrapper">
              <span class="input-addon">$</span>
              <input type="number" id="loanAmountNum" min="1000" max="10000000" step="1000">
            </div>
          </div>
          <div class="slider-container">
            <input type="range" id="loanAmountRange" min="1000" max="2000000" step="1000">
          </div>
        </div>

        <!-- Input Group: Down Payment -->
        <div class="input-group">
          <div class="label-row">
            <label for="downPaymentNum">Down Payment</label>
            <div class="input-wrapper">
              <span class="input-addon">$</span>
              <input type="number" id="downPaymentNum" min="0" max="10000000" step="1000">
            </div>
          </div>
          <div class="slider-container">
            <input type="range" id="downPaymentRange" min="0" max="500000" step="1000">
          </div>
        </div>

        <!-- Input Group: Interest Rate -->
        <div class="input-group">
          <div class="label-row">
            <label for="interestRateNum">Interest Rate</label>
            <div class="input-wrapper">
              <input type="number" id="interestRateNum" min="0.1" max="15" step="0.01">
              <span class="input-addon-suffix">%</span>
            </div>
          </div>
          <div class="slider-container">
            <input type="range" id="interestRateRange" min="0.1" max="15" step="0.05">
          </div>
        </div>

        <!-- Input Group: Loan Term -->
        <div class="input-group">
          <div class="label-row">
            <label for="loanTermNum">Loan Term</label>
            <div class="input-wrapper">
              <input type="number" id="loanTermNum" min="1" max="50" step="1">
              <span class="input-addon-suffix">Yrs</span>
            </div>
          </div>
          <div class="slider-container">
            <input type="range" id="loanTermRange" min="1" max="40" step="1">
          </div>
        </div>
      </main>

      <!-- Right Column: Results Panel -->
      <aside class="panel">
        <div class="results-header">
          <span>Monthly Payment</span>
          <div class="monthly-payment-amount" id="monthlyPayment">$0.00</div>
        </div>

        <!-- Dynamic Donut Chart Visualizing Ratios -->
        <div class="chart-container">
          <div class="donut-chart" id="donutChart">
            <div class="chart-label">
              <div class="percent-val" id="principalPercent">50%</div>
              <div class="sub-text">Principal</div>
            </div>
          </div>
        </div>

        <!-- Result Metrics List -->
        <div class="breakdown-list">
          <div class="breakdown-item">
            <span class="item-label">
              <span class="color-dot dot-principal"></span>
              Principal Loan Amount
            </span>
            <span class="item-value" id="principalValue">$0.00</span>
          </div>
          <div class="breakdown-item">
            <span class="item-label">
              <span class="color-dot dot-interest"></span>
              Total Interest Paid
            </span>
            <span class="item-value" id="interestValue">$0.00</span>
          </div>
          <div class="breakdown-item">
            <span class="item-label" style="font-weight: 600; color: var(--text-main);">
              Total Cost of Loan
            </span>
            <span class="item-value total-paid-value" id="totalCostValue">$0.00</span>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    // System Config & Defaults
    const STORAGE_KEY = 'mortgageCalcData';
    const DEFAULTS = {
      loanAmount: 400000,
      downPayment: 80000,
      interestRate: 6.5,
      loanTerm: 30
    };

    // DOM Selections
    const dom = {
      loanAmountNum: document.getElementById('loanAmountNum'),
      loanAmountRange: document.getElementById('loanAmountRange'),
      downPaymentNum: document.getElementById('downPaymentNum'),
      downPaymentRange: document.getElementById('downPaymentRange'),
      interestRateNum: document.getElementById('interestRateNum'),
      interestRateRange: document.getElementById('interestRateRange'),
      loanTermNum: document.getElementById('loanTermNum'),
      loanTermRange: document.getElementById('loanTermRange'),
      monthlyPayment: document.getElementById('monthlyPayment'),
      donutChart: document.getElementById('donutChart'),
      principalPercent: document.getElementById('principalPercent'),
      principalValue: document.getElementById('principalValue'),
      interestValue: document.getElementById('interestValue'),
      totalCostValue: document.getElementById('totalCostValue')
    };

    // Currency Formatter
    const formatCurrency = (val) => {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 2
      }).format(val);
    };

    // Save interactive inputs state to persistent LocalStorage
    function saveData() {
      const data = {
        loanAmount: parseFloat(dom.loanAmountNum.value) || DEFAULTS.loanAmount,
        downPayment: parseFloat(dom.downPaymentNum.value) || 0,
        interestRate: parseFloat(dom.interestRateNum.value) || DEFAULTS.interestRate,
        loanTerm: parseInt(dom.loanTermNum.value, 10) || DEFAULTS.loanTerm
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // Retrieve state from persistent LocalStorage with structural fallbacks
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          return { ...DEFAULTS, ...parsed };
        } catch (e) {
          return DEFAULTS;
        }
      }
      return DEFAULTS;
    }

    // Dynamic Donut Chart Drawing Logic (Using CSS conic-gradient property)
    function updateChart(principalAmount, totalInterest) {
      const totalCost = principalAmount + totalInterest;
      let pRatio = 100;

      if (totalCost > 0) {
        pRatio = (principalAmount / totalCost) * 100;
      }

      const pPercentStr = `${Math.round(pRatio)}%`;
      dom.principalPercent.textContent = pPercentStr;

      // Render gradient dynamic angles representing relative cost allocations
      dom.donutChart.style.background = `conic-gradient(
        var(--accent-color) 0% ${pRatio}%, 
        var(--interest-color) ${pRatio}% 100%
      )`;
    }

    // Core Mathematical Mortgage Computations
    function calculate() {
      // Input Validation Sanity Checks
      let homePrice = parseFloat(dom.loanAmountNum.value) || 0;
      let downPayment = parseFloat(dom.downPaymentNum.value) || 0;
      let annualRate = parseFloat(dom.interestRateNum.value) || 0;
      let years = parseInt(dom.loanTermNum.value, 10) || 0;

      // Handle edge cases contextually: Down Payment exceeding home cost
      if (downPayment > homePrice) {
        downPayment = homePrice;
        dom.downPaymentNum.value = downPayment;
        dom.downPaymentRange.value = downPayment;
      }

      // Dynamic synchronization constraints update for downstream inputs
      dom.downPaymentNum.max = homePrice;
      dom.downPaymentRange.max = homePrice;

      // Principal amount computation
      const principal = Math.max(0, homePrice - downPayment);

      const monthlyRate = (annualRate / 100) / 12;
      const totalPayments = years * 12;

      let monthlyPayment = 0;

      if (principal > 0 && totalPayments > 0) {
        if (monthlyRate === 0) {
          // Zero-interest calculation logic fallback (Simple linear amortization)
          monthlyPayment = principal / totalPayments;
        } else {
          // Standard compound amortization formula: 
          // M = P * [r * (1 + r)^n] / [(1 + r)^n - 1]
          monthlyPayment = principal * (monthlyRate * Math.pow(1 + monthlyRate, totalPayments)) / 
                           (Math.pow(1 + monthlyRate, totalPayments) - 1);
        }
      }

      // Safeguard metrics formatting values against division anomalies / negative numbers
      monthlyPayment = isFinite(monthlyPayment) && monthlyPayment > 0 ? monthlyPayment : 0;
      const totalCost = monthlyPayment * totalPayments;
      const totalInterest = Math.max(0, totalCost - principal);

      // DOM Node Updates
      dom.monthlyPayment.textContent = formatCurrency(monthlyPayment);
      dom.principalValue.textContent = formatCurrency(principal);
      dom.interestValue.textContent = formatCurrency(totalInterest);
      dom.totalCostValue.textContent = formatCurrency(totalCost);

      // Rendering visualizations
      updateChart(principal, totalInterest);
    }

    // Bidirectional element bindings with slider controls
    function setupDualBinding(numInput, rangeInput, key, maxRefSelector = null) {
      // Sync Range input sliding into Numeric value box
      rangeInput.addEventListener('input', (e) => {
        let val = parseFloat(e.target.value) || 0;
        numInput.value = val;
        calculate();
        saveData();
      });

      // Sync Numeric value change into Range Slider matching step bounds
      numInput.addEventListener('input', (e) => {
        let val = parseFloat(e.target.value);
        if (isNaN(val) || val < 0) val = 0;
        
        // Dynamically clamp inputs inside safe element configurations
        const min = parseFloat(numInput.min) || 0;
        const max = parseFloat(numInput.max) || 10000000;
        
        if (val < min) val = min;
        if (val > max) val = max;

        rangeInput.value = val;
        calculate();
        saveData();
      });

      // Clamp values cleanly on input blur interactions to avoid incomplete formatting states
      numInput.addEventListener('blur', () => {
        if (numInput.value === "" || isNaN(parseFloat(numInput.value))) {
          numInput.value = DEFAULTS[key] !== undefined ? DEFAULTS[key] : 0;
          rangeInput.value = numInput.value;
          calculate();
          saveData();
        }
      });
    }

    // Initialization Entrypoint
    function init() {
      const data = loadData();

      // Configure Dynamic Inputs
      dom.loanAmountNum.value = data.loanAmount;
      dom.loanAmountRange.value = data.loanAmount;
      
      // Update maximum range on initialization to support higher default options safely
      dom.downPaymentNum.max = data.loanAmount;
      dom.downPaymentRange.max = data.loanAmount;

      dom.downPaymentNum.value = data.downPayment;
      dom.downPaymentRange.value = data.downPayment;

      dom.interestRateNum.value = data.interestRate;
      dom.interestRateRange.value = data.interestRate;

      dom.loanTermNum.value = data.loanTerm;
      dom.loanTermRange.value = data.loanTerm;

      // Event Listeners setup
      setupDualBinding(dom.loanAmountNum, dom.loanAmountRange, 'loanAmount');
      setupDualBinding(dom.downPaymentNum, dom.downPaymentRange, 'downPayment');
      setupDualBinding(dom.interestRateNum, dom.interestRateRange, 'interestRate');
      setupDualBinding(dom.loanTermNum, dom.loanTermRange, 'loanTerm');

      // Initialize calculations and state layouts
      calculate();
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

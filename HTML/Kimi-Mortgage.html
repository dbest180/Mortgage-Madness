<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Mortgage Calculator</title>
    <style>
        /* ============================================
           CSS VARIABLES & RESET
           ============================================ */
        :root {
            --bg-deep: #121212;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-card: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
            --radius: 16px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --font-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-base);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: var(--spacing-xl) var(--spacing-md);
            line-height: 1.5;
        }

        /* ============================================
           MAIN LAYOUT GRID
           ============================================ */
        .container {
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* ============================================
           GLASSMORPHISM CARD COMPONENT
           ============================================ */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius);
            padding: var(--spacing-xl);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            letter-spacing: -0.02em;
        }

        /* ============================================
           INPUT GROUPS
           ============================================ */
        .input-group {
            margin-bottom: var(--spacing-lg);
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        /* Number input styling */
        .number-input {
            flex: 0 0 120px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-card);
            border-radius: 8px;
            padding: 10px var(--spacing-sm);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .number-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .number-input::placeholder {
            color: var(--text-muted);
        }

        /* Range slider styling */
        .range-input {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .range-input::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.6);
        }

        .range-input::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
        }

        /* Input unit suffix */
        .input-suffix {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-left: 4px;
        }

        /* ============================================
           RESULTS SECTION
           ============================================ */
        .results-card {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .primary-result {
            text-align: center;
            padding: var(--spacing-lg) 0;
        }

        .primary-result-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: var(--spacing-sm);
        }

        .primary-result-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.03em;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .secondary-results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: var(--spacing-md);
            text-align: center;
        }

        .result-item-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: var(--spacing-xs);
        }

        .result-item-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ============================================
           DONUT CHART (Pure CSS conic-gradient)
           ============================================ */
        .chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-md);
        }

        .donut-chart {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            /* conic-gradient creates the pie segments */
            background: conic-gradient(
                var(--accent) 0deg var(--principal-angle, 0deg),
                rgba(255, 255, 255, 0.15) var(--principal-angle, 0deg) 360deg
            );
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.08);
        }

        /* Inner hole to create donut effect */
        .donut-chart::after {
            content: '';
            width: 120px;
            height: 120px;
            background: var(--bg-deep);
            border-radius: 50%;
            position: absolute;
        }

        .chart-legend {
            display: flex;
            gap: var(--spacing-lg);
            font-size: 0.875rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.principal {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .legend-dot.interest {
            background: rgba(255, 255, 255, 0.15);
        }

        .legend-label {
            color: var(--text-secondary);
        }

        .legend-value {
            color: var(--text-primary);
            font-weight: 600;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============================================
             LEFT COLUMN: INPUTS
             ============================================ -->
        <div class="card inputs-card">
            <h2 class="card-title">Loan Details</h2>

            <!-- Loan Amount -->
            <div class="input-group">
                <div class="input-label">
                    <span>Loan Amount</span>
                </div>
                <div class="input-wrapper">
                    <input 
                        type="range" 
                        id="loanAmountRange" 
                        class="range-input"
                        min="10000" 
                        max="2000000" 
                        step="1000"
                        value="300000"
                    >
                    <input 
                        type="number" 
                        id="loanAmount" 
                        class="number-input"
                        min="0" 
                        step="1000"
                        value="300000"
                    >
                    <span class="input-suffix">$</span>
                </div>
            </div>

            <!-- Interest Rate -->
            <div class="input-group">
                <div class="input-label">
                    <span>Interest Rate</span>
                </div>
                <div class="input-wrapper">
                    <input 
                        type="range" 
                        id="interestRateRange" 
                        class="range-input"
                        min="0.1" 
                        max="15" 
                        step="0.1"
                        value="4.5"
                    >
                    <input 
                        type="number" 
                        id="interestRate" 
                        class="number-input"
                        min="0" 
                        max="100" 
                        step="0.01"
                        value="4.5"
                    >
                    <span class="input-suffix">%</span>
                </div>
            </div>

            <!-- Loan Term -->
            <div class="input-group">
                <div class="input-label">
                    <span>Loan Term</span>
                </div>
                <div class="input-wrapper">
                    <input 
                        type="range" 
                        id="loanTermRange" 
                        class="range-input"
                        min="1" 
                        max="40" 
                        step="1"
                        value="30"
                    >
                    <input 
                        type="number" 
                        id="loanTerm" 
                        class="number-input"
                        min="1" 
                        max="100" 
                        step="1"
                        value="30"
                    >
                    <span class="input-suffix">yr</span>
                </div>
            </div>

            <!-- Down Payment -->
            <div class="input-group">
                <div class="input-label">
                    <span>Down Payment</span>
                </div>
                <div class="input-wrapper">
                    <input 
                        type="range" 
                        id="downPaymentRange" 
                        class="range-input"
                        min="0" 
                        max="500000" 
                        step="1000"
                        value="60000"
                    >
                    <input 
                        type="number" 
                        id="downPayment" 
                        class="number-input"
                        min="0" 
                        step="1000"
                        value="60000"
                    >
                    <span class="input-suffix">$</span>
                </div>
            </div>
        </div>

        <!-- ============================================
             RIGHT COLUMN: RESULTS
             ============================================ -->
        <div class="card results-card">
            <h2 class="card-title">Payment Summary</h2>

            <!-- Monthly Payment (Dominant) -->
            <div class="primary-result">
                <div class="primary-result-label">Monthly Payment</div>
                <div class="primary-result-value" id="monthlyPayment">$0</div>
            </div>

            <!-- Secondary Results Grid -->
            <div class="secondary-results">
                <div class="result-item">
                    <div class="result-item-label">Total Interest</div>
                    <div class="result-item-value" id="totalInterest">$0</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">Total Cost</div>
                    <div class="result-item-value" id="totalCost">$0</div>
                </div>
            </div>

            <!-- Donut Chart -->
            <div class="chart-container">
                <div class="donut-chart" id="donutChart"></div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <div class="legend-dot principal"></div>
                        <span class="legend-label">Principal</span>
                        <span class="legend-value" id="principalPercent">0%</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot interest"></div>
                        <span class="legend-label">Interest</span>
                        <span class="legend-value" id="interestPercent">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ============================================
           DOM ELEMENT REFERENCES
           ============================================ */
        const inputs = {
            loanAmount: document.getElementById('loanAmount'),
            loanAmountRange: document.getElementById('loanAmountRange'),
            interestRate: document.getElementById('interestRate'),
            interestRateRange: document.getElementById('interestRateRange'),
            loanTerm: document.getElementById('loanTerm'),
            loanTermRange: document.getElementById('loanTermRange'),
            downPayment: document.getElementById('downPayment'),
            downPaymentRange: document.getElementById('downPaymentRange')
        };

        const outputs = {
            monthlyPayment: document.getElementById('monthlyPayment'),
            totalInterest: document.getElementById('totalInterest'),
            totalCost: document.getElementById('totalCost'),
            donutChart: document.getElementById('donutChart'),
            principalPercent: document.getElementById('principalPercent'),
            interestPercent: document.getElementById('interestPercent')
        };

        const STORAGE_KEY = 'mortgageCalcData';

        /* ============================================
           UTILITY: Currency Formatter
           ============================================ */
        const formatCurrency = (num) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(num);
        };

        /* ============================================
           UTILITY: Percentage Formatter
           ============================================ */
        const formatPercent = (num) => {
            return num.toFixed(1) + '%';
        };

        /* ============================================
           SYNC: Bidirectional slider <-> number input
           ============================================ */
        const syncPair = (numberInput, rangeInput) => {
            // When number input changes, update slider
            numberInput.addEventListener('input', () => {
                let val = parseFloat(numberInput.value);
                // Validation: prevent negative and NaN
                if (isNaN(val) || val < 0) val = 0;
                // Clamp to range max for slider sync
                const max = parseFloat(rangeInput.max);
                if (val > max) val = max;
                rangeInput.value = val;
                calculate();
                saveData();
            });

            // When slider changes, update number input
            rangeInput.addEventListener('input', () => {
                numberInput.value = rangeInput.value;
                calculate();
                saveData();
            });
        };

        // Initialize sync for all input pairs
        syncPair(inputs.loanAmount, inputs.loanAmountRange);
        syncPair(inputs.interestRate, inputs.interestRateRange);
        syncPair(inputs.loanTerm, inputs.loanTermRange);
        syncPair(inputs.downPayment, inputs.downPaymentRange);

        /* ============================================
           CALCULATION ENGINE
           Formula: M = P * [r(1+r)^n] / [(1+r)^n - 1]
           Where:
             M = monthly payment
             P = principal (loan amount - down payment)
             r = monthly interest rate (annual / 12 / 100)
             n = total number of payments (years * 12)
           ============================================ */
        function calculate() {
            // Parse and sanitize inputs
            const loanAmount = Math.max(0, parseFloat(inputs.loanAmount.value) || 0);
            const annualRate = Math.max(0, parseFloat(inputs.interestRate.value) || 0);
            const years = Math.max(1, parseFloat(inputs.loanTerm.value) || 1);
            const downPayment = Math.max(0, parseFloat(inputs.downPayment.value) || 0);

            // Principal is loan amount minus down payment (cannot be negative)
            const principal = Math.max(0, loanAmount - downPayment);

            // Monthly interest rate as decimal
            const monthlyRate = annualRate / 100 / 12;

            // Total number of monthly payments
            const totalPayments = years * 12;

            let monthlyPayment = 0;
            let totalCost = 0;
            let totalInterest = 0;

            if (monthlyRate === 0) {
                // Zero-interest edge case: simple division
                monthlyPayment = principal / totalPayments;
                totalCost = principal;
                totalInterest = 0;
            } else {
                // Standard amortization formula
                // factor = (1 + r)^n
                const factor = Math.pow(1 + monthlyRate, totalPayments);
                // M = P * [r * factor] / [factor - 1]
                monthlyPayment = principal * (monthlyRate * factor) / (factor - 1);
                totalCost = monthlyPayment * totalPayments;
                totalInterest = totalCost - principal;
            }

            // Handle NaN from edge cases (e.g., all zeros)
            if (isNaN(monthlyPayment)) monthlyPayment = 0;
            if (isNaN(totalCost)) totalCost = 0;
            if (isNaN(totalInterest)) totalInterest = 0;

            // Update DOM
            outputs.monthlyPayment.textContent = formatCurrency(monthlyPayment);
            outputs.totalInterest.textContent = formatCurrency(totalInterest);
            outputs.totalCost.textContent = formatCurrency(totalCost);

            // Update chart
            updateChart(principal, totalInterest);
        }

        /* ============================================
           CHART UPDATE: Pure CSS conic-gradient
           We set a CSS custom property --principal-angle
           to control the pie slice size.
           360 degrees = full circle.
           ============================================ */
        function updateChart(principal, totalInterest) {
            const total = principal + totalInterest;
            let principalAngle = 0;

            if (total > 0) {
                principalAngle = (principal / total) * 360;
            }

            // Set CSS custom property for conic-gradient
            outputs.donutChart.style.setProperty('--principal-angle', principalAngle + 'deg');

            // Update legend percentages
            let principalPct = 0;
            let interestPct = 0;

            if (total > 0) {
                principalPct = (principal / total) * 100;
                interestPct = (totalInterest / total) * 100;
            }

            outputs.principalPercent.textContent = formatPercent(principalPct);
            outputs.interestPercent.textContent = formatPercent(interestPct);
        }

        /* ============================================
           PERSISTENCE: localStorage
           ============================================ */
        function saveData() {
            const data = {
                loanAmount: inputs.loanAmount.value,
                interestRate: inputs.interestRate.value,
                loanTerm: inputs.loanTerm.value,
                downPayment: inputs.downPayment.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;

                const data = JSON.parse(raw);

                // Restore values if they exist
                if (data.loanAmount !== undefined) {
                    inputs.loanAmount.value = data.loanAmount;
                    inputs.loanAmountRange.value = data.loanAmount;
                }
                if (data.interestRate !== undefined) {
                    inputs.interestRate.value = data.interestRate;
                    inputs.interestRateRange.value = data.interestRate;
                }
                if (data.loanTerm !== undefined) {
                    inputs.loanTerm.value = data.loanTerm;
                    inputs.loanTermRange.value = data.loanTerm;
                }
                if (data.downPayment !== undefined) {
                    inputs.downPayment.value = data.downPayment;
                    inputs.downPaymentRange.value = data.downPayment;
                }
            } catch (e) {
                // Silently fail if localStorage is unavailable or corrupt
                console.warn('Failed to load mortgage calculator data:', e);
            }
        }

        /* ============================================
           INITIALIZATION
           ============================================ */
        function init() {
            loadData();
            calculate();
        }

        // Run on page load
        init();
    </script>
</body>
</html>
